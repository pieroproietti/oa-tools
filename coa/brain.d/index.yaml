# Mappatura: a quale file .yaml corrisponde ogni ID o ID_LIKE
distributions:
  - id: "debian"
    like: ["ubuntu", "linuxmint", "kali", "pop"]
    file: "debian.yaml"
  
  - id: "arch"
    like: ["endeavouros", "cachyos"]
    file: "arch.yaml"

  - id: "manjaro"
    like: ["manjaro", "bigcommunity"]
    file: "manjaro.yaml"

  - id: "fedora"
    like: ["nobara"]
    file: "fedora.yaml"
