# Profilo di Rimasterizzazione per Fedora (OA) - Evolution Edition
remaster:
  - name: "coa-fs-setup"
    description: "Preparazione filesystem e mount (proiezione host)"
    command: "oa_mount_logic"

  - name: "coa-identity"
    description: "Gestione nativa identità (Purge & Inject stile Yocto)"
    command: "oa_users"

  # ---------------------------------------------------------
  # 04. ENABLE SUDO USER LIVE
  # ---------------------------------------------------------
  - name: "coa-enable-live"
    description: "Abilitazione poteri sudo per user live"
    command: "oa_shell"
    run_command: |
      mkdir -p /etc/sudoers.d
      rm -f /etc/sudoers.d/00*
      echo "live ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/00-live
      chmod 0440 /etc/sudoers.d/00-live
    chroot: true

  - name: "coa-initrd"
    description: "Generazione Initramfs tramite dracut (Fedora)"
    command: "oa_shell"
    # dracut -f rigenera l'initramfs per il kernel corrente
    run_command: "dracut -f --no-hostonly /boot/initramfs-fedora.img"
    chroot: true

  - name: "coa-live-struct"
    description: "Creazione della struttura isodir per il boot"
    command: "oa_mkdir"
    path: "/home/eggs/isodir/live"

  - name: "coa-kernel-copy"
    description: "Copia del Kernel e Initrd (standardizzati per la ISO)"
    command: "oa_shell"
    # Fedora usa versioni specifiche nel nome file, qui usiamo un glob o il nome generato sopra
    run_command: "cp /home/eggs/liveroot/boot/vmlinuz-* /home/eggs/isodir/live/vmlinuz && cp /home/eggs/liveroot/boot/initramfs-fedora.img /home/eggs/isodir/live/initrd.img"

  - name: "coa-bootloaders"
    description: "Copia dei bootloader e creazione immagine FAT per UEFI"
    command: "oa_shell"
    run_command: |
      set -e
      mkdir -p /home/eggs/isodir/isolinux
      mkdir -p /home/eggs/isodir/boot/grub
      mkdir -p /home/eggs/isodir/EFI/BOOT
      
      # ISOLINUX
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.bin /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/syslinux/modules/bios/*.c32 /home/eggs/isodir/isolinux/
      
      # GRUB & UEFI
      cp /tmp/coa/bootloaders/grub/x86_64-efi/monolithic/grubx64.efi /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI
      
      # Creazione FAT EFI IMG
      dd if=/dev/zero of=/home/eggs/isodir/EFI/BOOT/efi.img bs=1k count=8192
      mkfs.vfat /home/eggs/isodir/EFI/BOOT/efi.img
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI/BOOT
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI

  - name: "coa-live-menus"
    description: "Generazione configurazioni di boot (Fedora style)"
    command: "oa_shell"
    chroot: false
    run_command: |
      set -e
      VOL_ID="OA_LIVE"
      BOOT_PARAMS="root=live:LABEL=${VOL_ID} rd.live.image quiet splash"
      WORK_DIR="/home/eggs/isodir"

      # 1. GRUB.cfg
      cat <<EOF > ${WORK_DIR}/boot/grub/grub.cfg
      set timeout=5
      set default=0
      insmod all_video
      search --no-floppy --set=root --label ${VOL_ID}

      menuentry "Start OA Live (Fedora)" {
          linux /live/vmlinuz ${BOOT_PARAMS}
          initrd /live/initrd.img
      }
      EOF

      # 2. ISOLINUX.cfg
      cat <<EOF > ${WORK_DIR}/isolinux/isolinux.cfg
      UI vesamenu.c32
      TIMEOUT 50
      DEFAULT fedora

      LABEL fedora
          MENU LABEL Start OA Live (Fedora)
          LINUX /live/vmlinuz
          APPEND initrd=/live/initrd.img ${BOOT_PARAMS}
      EOF

      # 3. EFI Trampoline
      cat <<EOF > ${WORK_DIR}/EFI/BOOT/grub.cfg
      search --set=root --label ${VOL_ID}
      set prefix=(\$root)/boot/grub
      configfile \$prefix/grub.cfg
      EOF

  - name: "coa-squashfs"
    description: "Compressione del sistema (ZSTD)"
    command: "oa_shell"
    run_command: "mksquashfs /home/eggs/liveroot /home/eggs/isodir/live/filesystem.squashfs -comp zstd -Xcompression-level 3 -b 1M -noappend -ef /tmp/coa/excludes.list"

  - name: "coa-xorriso"
    description: "Creazione della ISO finale con xorriso"
    command: "oa_shell"
    run_command: "xorriso -as mkisofs -r -J -joliet-long -l -cache-inodes -V 'OA_LIVE' -isohybrid-mbr /tmp/coa/bootloaders/ISOLINUX/isohdpfx.bin -partition_offset 16 -A 'OA_LIVE' -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e EFI/BOOT/efi.img -no-emul-boot -isohybrid-gpt-basdat -o /home/eggs/egg-of_final.iso /home/eggs/isodir"

  - name: "coa-cleanup"
    description: "Smontaggio e pulizia"
    command: "oa_umount"

install:
  - name: "coa-initrd-target"
    description: "Rigenerazione dracut sul sistema installato"
    command: "oa_shell"
    run_command: "dracut -f"
    chroot: true