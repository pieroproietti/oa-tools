# Profilo di Rimasterizzazione per Arch Linux (Coala Edition)
remaster:
  - name: "coa-identity"
    description: "Gestione nativa identità (Purge & Inject stile Yocto)"
    command: "oa_users" # Coala passerà l'oggetto users con i gruppi wheel, video, audio, autologin

  - name: "coa-privileges"
    description: "Abilitazione poteri sudo per il gruppo wheel"
    command: "echo '%wheel ALL=(ALL:ALL) NOPASSWD: ALL' > /etc/sudoers.d/10-live-wheel && chmod 440 /etc/sudoers.d/10-live-wheel"
    chroot: true

  - name: "coa-initrd"
    description: "Generazione Initramfs custom (Arch mkinitcpio)"
    command: "mv /etc/mkinitcpio.conf /etc/mkinitcpio.conf.bak && cp /etc/coa-mkinitcpio.conf /etc/mkinitcpio.conf && mkinitcpio -P; mv /etc/mkinitcpio.conf.bak /etc/mkinitcpio.conf"
    chroot: true

  - name: "coa-live-struct"
    description: "Creazione della struttura isodir/live"
    command: "mkdir -p /home/eggs/isodir/live"

  - name: "coa-kernel-copy"
    description: "Copia del Kernel standardizzato (vmlinuz-linux-lts)"
    command: "cp /home/eggs/liveroot/boot/vmlinuz-linux-lts /home/eggs/isodir/live/vmlinuz"

  - name: "coa-initrd-copy"
    description: "Copia dell'Initrd standardizzato (initramfs-linux-lts.img)"
    command: "cp /home/eggs/liveroot/boot/initramfs-linux-lts.img /home/eggs/isodir/live/initrd.img"

  - name: "coa-bootloaders-copy"
    description: "Copia moduli GRUB e ISOLINUX"
    command: |
      cp -a /tmp/coa/bootloaders/grub/x86_64-efi/. /home/eggs/isodir/boot/grub/x86_64-efi/ && \
      cp -a /tmp/coa/bootloaders/ISOLINUX/. /home/eggs/isodir/isolinux/ && \
      cp /tmp/coa/bootloaders/syslinux/modules/bios/*.c32 /home/eggs/isodir/isolinux/

  - name: "coa-efi-prep"
    description: "Preparazione EFI e immagine efi.img"
    command: |
      mkdir -p /home/eggs/isodir/EFI/BOOT && \
      cp /tmp/coa/bootloaders/grub/x86_64-efi/monolithic/grubx64.efi /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI && \
      dd if=/dev/zero of=/home/eggs/isodir/EFI/BOOT/efi.img bs=1k count=8192 && \
      mkfs.vfat /home/eggs/isodir/EFI/BOOT/efi.img && \
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI && \
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI/BOOT && \
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI && \
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/grub.cfg ::/EFI/BOOT/grub.cfg

  - name: "coa-iso-layout"
    description: "ISO Layout link: arch/x86_64/airootfs.sfs"
    command: "mkdir -p /home/eggs/isodir/arch/x86_64 && ln -sf ../../live/filesystem.squashfs /home/eggs/isodir/arch/x86_64/airootfs.sfs"

  - name: "coa-squashfs"
    description: "Compressione SquashFS (zstd livello 3)"
    command: "mksquashfs /home/eggs/liveroot /home/eggs/isodir/live/filesystem.squashfs -comp zstd -Xcompression-level 3 -b 1M -processors 4 -noappend -wildcards -ef /tmp/coa/excludes.list"

  - name: "coa-xorriso"
    description: "Creazione della ISO finale"
    command: "xorriso -as mkisofs -r -J -joliet-long -l -cache-inodes -V 'OA_LIVE' -isohybrid-mbr /tmp/coa/bootloaders/ISOLINUX/isohdpfx.bin -partition_offset 16 -A 'OA_LIVE' -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e EFI/BOOT/efi.img -no-emul-boot -isohybrid-gpt-basdat -o /home/eggs/egg-coa-arch.iso /home/eggs/isodir"

  - name: "coa-cleanup"
    description: "Smontaggio e pulizia finale"
    command: "oa_umount"